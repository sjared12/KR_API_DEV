<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Permissions Admin</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
    th, td { border: 1px solid #ccc; padding: 0.5rem; text-align: left; }
    th { background: #f0f0f0; }
    .perm-checkbox { width: 1.2em; height: 1.2em; }
    .save-btn { padding: 0.3em 1em; }
  </style>
</head>
<body>
  <h1>User Permissions Admin</h1>
  <div id="status"></div>
  <table id="userTable">
    <thead>
      <tr>
        <th>Username</th>
        <th>Email</th>
        <th>Full Name</th>
        <th>Active</th>
        <th>Permissions</th>
        <th>Save</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <script>
    const permissions = [
      'VIEW_SUBSCRIPTIONS', 'CANCEL_SUBSCRIPTIONS', 'REQUEST_REFUNDS', 'APPROVE_REFUNDS', 'VIEW_REFUNDS',
      'MANAGE_USERS', 'VIEW_USERS', 'SYSTEM_ADMIN'
    ];
    async function fetchUsers() {
      // Use relative path so it works under /payments/
      const res = await fetch('api/admin/users');
      return res.json();
    }
    async function savePermissions(userId, perms) {
      const res = await fetch(`/api/admin/users/${userId}/permissions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ permissions: perms })
      });
      return res.ok;
    }
    function render(users) {
      const tbody = document.querySelector('#userTable tbody');
      tbody.innerHTML = '';
      users.forEach(user => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${user.username}</td>
          <td>${user.email || ''}</td>
          <td>${user.fullName || ''}</td>
          <td>${user.active ? 'Yes' : 'No'}</td>
          <td>${permissions.map(perm => `
            <label><input type="checkbox" class="perm-checkbox" data-user="${user.id}" data-perm="${perm}" ${user.permissions.includes(perm) ? 'checked' : ''}/> ${perm}</label><br>`).join('')}</td>
          <td><button class="save-btn" data-user="${user.id}">Save</button></td>
        `;
        tbody.appendChild(tr);
      });
    }
    document.addEventListener('click', async e => {
      if (e.target.classList.contains('save-btn')) {
        const userId = e.target.getAttribute('data-user');
        const checkboxes = document.querySelectorAll(`input.perm-checkbox[data-user="${userId}"]`);
        const perms = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.getAttribute('data-perm'));
        const ok = await savePermissions(userId, perms);
        document.getElementById('status').textContent = ok ? 'Permissions updated.' : 'Failed to update permissions.';
      }
    });
    fetchUsers().then(render);
  </script>
</body>
</html>
