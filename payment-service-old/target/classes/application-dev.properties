
# --- DEV PROFILE: H2 In-Memory Database for Local Development ---
spring.datasource.url=jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Admin Credentials (same as production, can override with env)
app.admin.user=${APP_ADMIN_USER:admin}
app.admin.pass=${APP_ADMIN_PASS:changeit}
