<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://static.cloudflareinsights.com https://apps.dev.krhscougarband.org; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; connect-src 'self' https://*; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; base-uri 'self'">
    <title>My Orders - KR Band Checkout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 1.8rem;
            margin: 0;
        }

        .nav-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: transparent;
            color: #667eea;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            margin-left: 10px;
        }

        .nav-btn:hover {
            background: #667eea;
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .order-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 25px;
            transition: transform 0.3s;
        }

        .order-card:hover {
            transform: translateY(-2px);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .order-number {
            font-size: 1.3rem;
            font-weight: 700;
            color: #333;
        }

        .order-date {
            color: #666;
            font-size: 0.95rem;
        }

        .status-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-confirmed {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status-processing {
            background: #cfe2ff;
            color: #084298;
        }

        .status-ready {
            background: #d4edda;
            color: #155724;
        }

        .status-completed {
            background: #d1e7dd;
            color: #0f5132;
        }

        .status-cancelled {
            background: #f8d7da;
            color: #721c24;
        }

        .payment-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-left: 10px;
        }

        .payment-pending {
            background: #fff3cd;
            color: #856404;
        }

        .payment-paid {
            background: #d1e7dd;
            color: #0f5132;
        }

        .payment-failed {
            background: #f8d7da;
            color: #721c24;
        }

        .order-items {
            margin: 15px 0;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            color: #666;
        }

        .order-total {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-amount {
            font-size: 1.5rem;
            font-weight: 700;
            color: #764ba2;
        }

        .cancel-btn {
            padding: 10px 20px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .cancel-btn:hover:not(:disabled) {
            background: #c82333;
        }

        .cancel-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .empty-state {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 60px;
            text-align: center;
            color: #666;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 1.2rem;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 My Orders</h1>
            <div>
                <a href="/payments/shop" class="nav-btn">Shop</a>
                <a href="/payments/cart" class="nav-btn">Cart</a>
            </div>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <div>Loading orders...</div>
        </div>

        <div id="ordersList" class="orders-list" style="display: none;"></div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <h2>No orders yet</h2>
            <p>Start shopping to create your first order</p>
            <a href="/payments/shop" class="nav-btn" style="display: inline-block; margin-top: 20px;">
                Browse Items
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadOrders();
        });

        async function loadOrders() {
            const loading = document.getElementById('loading');
            const ordersList = document.getElementById('ordersList');
            const emptyState = document.getElementById('emptyState');

            loading.style.display = 'block';
            ordersList.style.display = 'none';
            emptyState.style.display = 'none';

            try {
                const response = await fetch('/payments/api/orders/my', {
                    headers: { "Authorization": `Bearer ${localStorage.getItem("AUTH_TOKEN")}` }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        window.location.href = '/payments/';
                        return;
                    }
                    throw new Error('Failed to load orders');
                }

                const orders = await response.json();
                loading.style.display = 'none';

                if (orders.length === 0) {
                    emptyState.style.display = 'block';
                } else {
                    ordersList.style.display = 'flex';
                    displayOrders(orders);
                }
            } catch (error) {
                console.error('Error loading orders:', error);
                loading.style.display = 'none';
                emptyState.style.display = 'block';
            }
        }

        function displayOrders(orders) {
            const ordersList = document.getElementById('ordersList');
            ordersList.innerHTML = orders.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <div>
                            <div class="order-number">Order #${order.orderNumber}</div>
                            <div class="order-date">${formatDate(order.createdAt)}</div>
                        </div>
                        <div>
                            <span class="status-badge status-${order.status.toLowerCase()}">${order.status}</span>
                            <span class="payment-badge payment-${order.paymentStatus.toLowerCase()}">${order.paymentStatus}</span>
                        </div>
                    </div>

                    <div class="order-items">
                        ${order.items.map(item => `
                            <div class="order-item">
                                <span>${item.item.name} x ${item.quantity}</span>
                                <span>$${(item.subtotal / 100).toFixed(2)}</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="order-total">
                        <span class="total-amount">Total: $${(order.totalAmount / 100).toFixed(2)}</span>
                        ${order.status === 'PENDING' ? `
                            <button class="cancel-btn" onclick="cancelOrder('${order.orderNumber}')">
                                Cancel Order
                            </button>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        async function cancelOrder(orderNumber) {
            if (!confirm('Are you sure you want to cancel this order?')) {
                return;
            }

            try {
                const response = await fetch(`/payments/api/orders/${orderNumber}/cancel`, {
                    method: 'PUT',
                    headers: { "Authorization": `Bearer ${localStorage.getItem("AUTH_TOKEN")}` }
                });

                if (!response.ok) {
                    throw new Error('Failed to cancel order');
                }

                alert('Order cancelled successfully');
                loadOrders();
            } catch (error) {
                console.error('Error cancelling order:', error);
                alert('Failed to cancel order: ' + error.message);
            }
        }
    </script>
</body>
</html>
