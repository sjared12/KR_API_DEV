<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://static.cloudflareinsights.com https://apps.dev.krhscougarband.org; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; connect-src 'self' https://*; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; base-uri 'self'">    <title>Shop - KR Band Checkout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 1.8rem;
            margin: 0;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .nav-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: transparent;
            color: #667eea;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .nav-btn:hover {
            background: #667eea;
            color: white;
        }

        .cart-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
            text-decoration: none;
        }

        .cart-badge:hover {
            transform: scale(1.05);
        }

        .filters {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-bottom: 20px;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .item-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        .item-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .item-content {
            padding: 20px;
        }

        .item-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .item-category {
            color: #667eea;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .item-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #764ba2;
            margin-bottom: 15px;
        }

        .add-to-cart-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .add-to-cart-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #5568d3 0%, #6a3f8f 100%);
            transform: translateY(-2px);
        }

        .add-to-cart-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .empty-state {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 60px;
            text-align: center;
            color: #666;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 1.2rem;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛒 Shop Items</h1>
        <div class="header-actions">
            <a href="/payments/orders" class="nav-btn">My Orders</a>
            <a href="/payments/cart" class="cart-badge" id="cartBadge">
                🛒 Cart: <span id="cartCount">0</span>
            </a>
            <button class="nav-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="filters">
        <div class="filter-group">
            <button class="filter-btn active" data-category="ALL">All Items</button>
            <button class="filter-btn" data-category="INSTRUMENT">Instruments</button>
            <button class="filter-btn" data-category="ACCESSORY">Accessories</button>
            <button class="filter-btn" data-category="UNIFORM">Uniforms</button>
            <button class="filter-btn" data-category="EQUIPMENT">Equipment</button>
        </div>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div>Loading items...</div>
    </div>

    <div id="itemsContainer" class="items-grid" style="display: none;"></div>
    <div id="emptyState" class="empty-state" style="display: none;">
        <h2>No items found</h2>
        <p>Check back later for available items</p>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        let currentCategory = 'ALL';

        document.addEventListener('DOMContentLoaded', () => {
            updateCartCount();
            loadItems();

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.category;
                    loadItems();
                });
            });
        });

        async function loadItems() {
            const loading = document.getElementById('loading');
            const container = document.getElementById('itemsContainer');
            const emptyState = document.getElementById('emptyState');

            loading.style.display = 'block';
            container.style.display = 'none';
            emptyState.style.display = 'none';

            try {
                const url = currentCategory === 'ALL' 
                    ? '/payments/api/items'
                    : `/payments/api/items/category/${currentCategory}`;

                const response = await fetch(url, {
                    headers: { "Authorization": `Bearer ${localStorage.getItem("AUTH_TOKEN")}` }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        window.location.href = '/payments/';
                        return;
                    }
                    throw new Error('Failed to load items');
                }

                const items = await response.json();
                loading.style.display = 'none';

                if (items.length === 0) {
                    emptyState.style.display = 'block';
                } else {
                    container.style.display = 'grid';
                    displayItems(items);
                }
            } catch (error) {
                console.error('Error loading items:', error);
                loading.style.display = 'none';
                emptyState.style.display = 'block';
            }
        }

        function displayItems(items) {
            const container = document.getElementById('itemsContainer');
            container.innerHTML = items.map(item => `
                <div class="item-card">
                    <div class="item-image">${getCategoryIcon(item.category)}</div>
                    <div class="item-content">
                        <div class="item-name">${item.name}</div>
                        <div class="item-category">${item.category}</div>
                        <div class="item-price">$${(item.price / 100).toFixed(2)}</div>
                        <button class="add-to-cart-btn" 
                                onclick="addToCart(${item.id}, '${item.name}', ${item.price / 100})">
                            Add to Cart
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function getCategoryIcon(category) {
            const icons = {
                'INSTRUMENT': '🎺',
                'ACCESSORY': '🎵',
                'UNIFORM': '👔',
                'EQUIPMENT': '📦'
            };
            return icons[category] || '📦';
        }

        function addToCart(itemId, itemName, price) {
            const existingItem = cart.find(item => item.itemId === itemId);
            
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ itemId, itemName, price, quantity: 1 });
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();

            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = 'Added! ✓';
            setTimeout(() => {
                btn.textContent = originalText;
            }, 1000);
        }

        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
        }

        function logout() {
            localStorage.removeItem('cart');
            localStorage.removeItem('AUTH_TOKEN');
            window.location.href = '/payments/login';
        }
    </script>
</body>
</html>
