<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://static.cloudflareinsights.com https://apps.dev.krhscougarband.org; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; connect-src 'self' https://*; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; base-uri 'self'">
    <title>Profile - KR Band Checkout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 1.8rem;
            margin: 0;
        }

        .nav-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: transparent;
            color: #667eea;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            margin-left: 10px;
        }

        .nav-btn:hover {
            background: #667eea;
            color: white;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .profile-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 40px;
        }

        .profile-section {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .profile-section:last-child {
            border-bottom: none;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .form-select:focus {
            outline: none;
            border-color: #667eea;
        }

        .save-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .save-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #5568d3 0%, #6a3f8f 100%);
            transform: translateY(-2px);
        }

        .save-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .info-box p {
            color: #666;
            margin: 0;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👤 My Profile</h1>
            <div>
                <a href="/payments/shop" class="nav-btn">Shop</a>
                <a href="/payments/cart" class="nav-btn">Cart</a>
                <a href="/payments/orders" class="nav-btn">My Orders</a>
            </div>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <div>Loading profile...</div>
        </div>

        <div id="profileContent" class="profile-card" style="display: none;">
            <div class="success-message" id="successMessage">Profile updated successfully!</div>

            <div class="profile-section">
                <h2 class="section-title">User Information</h2>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="text" id="email" class="form-input" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input type="text" id="firstName" class="form-input" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input type="text" id="lastName" class="form-input" readonly>
                </div>
            </div>

            <div class="profile-section">
                <h2 class="section-title">Instrument Selection</h2>
                <div class="info-box">
                    <p>Select your instrument to automatically add required items when checking out</p>
                </div>
                <div class="form-group">
                    <label class="form-label">Primary Instrument</label>
                    <select id="instrument" class="form-select">
                        <option value="">Select an instrument...</option>
                        <option value="TRUMPET">Trumpet</option>
                        <option value="TROMBONE">Trombone</option>
                        <option value="SAXOPHONE">Saxophone</option>
                        <option value="CLARINET">Clarinet</option>
                        <option value="FLUTE">Flute</option>
                        <option value="PERCUSSION">Percussion</option>
                        <option value="TUBA">Tuba</option>
                        <option value="FRENCH_HORN">French Horn</option>
                        <option value="BARITONE">Baritone</option>
                        <option value="MELLOPHONE">Mellophone</option>
                    </select>
                </div>
                <button class="save-btn" onclick="saveProfile()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadProfile();
        });

        async function loadProfile() {
            const loading = document.getElementById('loading');
            const content = document.getElementById('profileContent');

            try {
                const response = await fetch('/payments/api/profile', {
                    headers: { "Authorization": `Bearer ${localStorage.getItem("AUTH_TOKEN")}` }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        window.location.href = '/payments/';
                        return;
                    }
                    throw new Error('Failed to load profile');
                }

                const profile = await response.json();
                loading.style.display = 'none';
                content.style.display = 'block';

                document.getElementById('email').value = profile.email || '';
                document.getElementById('firstName').value = profile.firstName || '';
                document.getElementById('lastName').value = profile.lastName || '';
                document.getElementById('instrument').value = profile.instrument || '';
            } catch (error) {
                console.error('Error loading profile:', error);
                alert('Failed to load profile');
            }
        }

        async function saveProfile() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Saving...';

            const instrument = document.getElementById('instrument').value;

            try {
                const response = await fetch('/payments/api/profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    headers: { "Authorization": `Bearer ${localStorage.getItem("AUTH_TOKEN")}` },
                    body: JSON.stringify({ instrument })
                });

                if (!response.ok) {
                    throw new Error('Failed to save profile');
                }

                const successMessage = document.getElementById('successMessage');
                successMessage.style.display = 'block';
                setTimeout(() => {
                    successMessage.style.display = 'none';
                }, 3000);

                btn.disabled = false;
                btn.textContent = 'Save Changes';
            } catch (error) {
                console.error('Error saving profile:', error);
                alert('Failed to save profile: ' + error.message);
                btn.disabled = false;
                btn.textContent = 'Save Changes';
            }
        }
    </script>
</body>
</html>
