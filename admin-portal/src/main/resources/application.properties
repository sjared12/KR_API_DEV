spring.application.name=admin-portal
server.port=8080
server.servlet.context-path=/admin

# DigitalOcean Configuration
digitalocean.api-token=${DO_API_TOKEN:}
digitalocean.app-id=${DO_APP_ID:}

# Config file path
app.config.path=${CONFIG_PATH:/data/config.json}

# Static Resources
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=3600

# Logging
logging.level.root=INFO
logging.level.com.example.adminportal=DEBUG

# Jackson
spring.jackson.default-property-inclusion=non_null

# Keycloak OAuth2 Configuration
keycloak.auth-server-url=${KEYCLOAK_AUTH_URL:http://localhost:8080/auth}
keycloak.realm=${KEYCLOAK_REALM:krhscougarband}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:admin-portal}
keycloak.logout-redirect-uri=${KEYCLOAK_LOGOUT_REDIRECT_URI:http://localhost:8080/admin}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${keycloak.auth-server-url}/realms/${keycloak.realm}
