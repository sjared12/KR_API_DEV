<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 Not Found</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #f5f7fa;
            color: #23263b;
            font-family: 'Inter', 'Segoe UI', 'Roboto', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 48px 32px 40px 32px;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.10), 0 1.5px 6px rgba(118, 75, 162, 0.08);
            max-width: 400px;
            width: 100%;
        }
        .error-icon {
            font-size: 4.5rem;
            color: #667eea;
            margin-bottom: 10px;
        }
        .error-code {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .message {
            font-size: 1.25rem;
            margin-bottom: 24px;
            font-weight: 500;
            color: #444;
        }
        .home-link {
            display: inline-block;
            margin-top: 10px;
            padding: 12px 32px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.10);
            transition: background 0.2s, box-shadow 0.2s;
        }
        .home-link:hover {
            background: linear-gradient(90deg, #764ba2, #667eea);
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.18);
        }
        @media (max-width: 600px) {
            .error-code { font-size: 2.2rem; }
            .container { padding: 24px 10px; }
            .error-icon { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">&#9888;</div>
        <div class="error-code">404</div>
        <div class="message">Sorry, the page you’re looking for can’t be found.<br>Return to the homepage to continue.</div>
        <a href="/" class="home-link">Go Home</a>
    </div>
</body>
</html>
